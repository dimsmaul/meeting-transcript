name: Release

# Automatic versioning from commit messages (Conventional Commits).
# Push to main → determine bump + channel from commits since the last stable tag.
#   stable  (feat:/fix:/perf:)          → build + GitHub Release + publish to stores
#   beta    ((beta) scope, e.g. feat(beta):) → build + GitHub PRE-release only, no stores
# Non-release commits (chore/docs/refactor/ci/test) → skip. No manual tagging.
on:
  push:
    branches: [main]
  workflow_dispatch: # emergency button: manual release from the Actions UI

permissions:
  contents: write # create tags + GitHub Releases

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.ver.outputs.release }}
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      channel: ${{ steps.ver.outputs.channel }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags needed to compute the next version

      - name: Compute next version & channel
        id: ver
        run: scripts/next-version.sh >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate computed version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "::error::Computed version '$VERSION' is invalid."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: oven-sh/setup-bun@v2

      - name: Vendor local-Whisper runtime
        run: scripts/vendor-whisper.sh

      - name: Package all targets
        run: scripts/package.sh "${{ needs.version.outputs.version }}" all

      - name: Upload zips as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          files: dist/*.zip
          generate_release_notes: true

  # --- Publish jobs: STABLE channel only (beta stays GitHub-prerelease-only).
  #     Each also skips itself when its main secret is empty. ---

  publish-chrome:
    needs: [version, build]
    if: needs.version.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: release-zips, path: dist }
      - name: Publish to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          APP_ID: ${{ secrets.CHROME_APP_ID }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [[ -z "$APP_ID" ]]; then
            echo "::notice::CHROME_APP_ID is empty — skipping Chrome publish."
            exit 0
          fi
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "dist/speaky-chromium-$VERSION.zip" \
            --extension-id "$APP_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --auto-publish

  publish-edge:
    needs: [version, build]
    if: needs.version.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: release-zips, path: dist }
      - name: Publish to Edge Add-ons
        env:
          PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          API_KEY: ${{ secrets.EDGE_API_KEY }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [[ -z "$PRODUCT_ID" ]]; then
            echo "::notice::EDGE_PRODUCT_ID is empty — skipping Edge publish."
            exit 0
          fi
          ZIP="dist/speaky-chromium-$VERSION.zip"
          curl -sS -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/$PRODUCT_ID/submissions/draft/package" \
            -H "Authorization: ApiKey $API_KEY" \
            -H "X-ClientID: $CLIENT_ID" \
            -H "Content-Type: application/zip" \
            --data-binary "@$ZIP"
          curl -sS -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/$PRODUCT_ID/submissions" \
            -H "Authorization: ApiKey $API_KEY" \
            -H "X-ClientID: $CLIENT_ID"

  publish-firefox:
    needs: [version, build]
    if: needs.version.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: release-zips, path: dist }
      - name: Publish to Firefox Add-ons (AMO)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [[ -z "$AMO_JWT_ISSUER" ]]; then
            echo "::notice::AMO_JWT_ISSUER is empty — skipping Firefox publish."
            exit 0
          fi
          npx --yes web-ext@latest sign \
            --channel listed \
            --source-dir dist/firefox \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
          || echo "::warning::Firefox sign failed — check the AMO review requirement."
