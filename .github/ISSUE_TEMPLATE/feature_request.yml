name: Feature request
description: Suggest an idea or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's currently hard or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Related phase
      description: See PRD §8 for phases.
      options:
        - "Phase 1 — caption scraping"
        - "Phase 2 — hardening"
        - "Phase 3 — audio pipeline / Whisper"
        - "Other / unsure"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
